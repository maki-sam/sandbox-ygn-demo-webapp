name: "Sandbox YGN CICD"

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ vars.GITLAB_USERNAME }}/sandbox-ygn-webapp

jobs:
  testing-app-with-redis:
    name: "Testing our WebApp with Redis"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6

      - name: "Set up NodeJS on Runner"
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: "Install Dependencies"
        run: npm install

      - name: "Start Application and Test with Redis"
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: production
          PORT: 3000

        run: | 
          node app.js &
          sleep 5 
          curl --silent --fail http://localhost:3000/health

      - name: "Testing Pass Message"
        run: echo "All tests passed successfully!"
  
  build-and-deploy:
    name: "Build Docker Image & Push to Docker Hub"
    needs: testing-app-with-redis
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v6
      
      - name: "Login to Docker Hub"
        uses: docker/login-action@v4
        with:
          username: ${{ vars.GITLAB_USERNAME }}
          password: ${{ secrets.GITLAB_PASSWORD }}

#      - name: "Build and Push Docker Image"
#        uses: docker/setup-buildx-action@v4

      - name: Push to Docker Hub
        uses: docker/build-push-action@v7
          with:
            push: true
            context: .
            tags: ${{ env.IMAGE_NAME }}:latest

      - name: "Docker Hub Push Success Message"
        run: echo "Docker image pushed to Docker Hub successfully!"

      - name: "Verify Docker Image on Docker Hub"
        run: |
        docker pull ${{ env.IMAGE_NAME }}:latest
        echo "Docker image pulled successfully from Docker Hub!"

