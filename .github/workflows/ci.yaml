name: "CI — Test on Every Push"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: "Run App Tests"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine        # Official Redis image (small)
        ports:
          - 6379:6379                # Maps container port 6379 to runner's 6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v3
      - name: "Set Up Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: "Install Dependencies"
        run: npm install
      - name: "🧪 Start app and test all endpoints"
        env:
          REDIS_HOST: localhost       # Where to find Redis (mapped from service)
          REDIS_PORT: 6379            # Redis default port
          NODE_ENV: test              # Tells our app it's in test mode
          PORT: 3000
        run: |
          node app.js &
          sleep 3
          curl --silent --fail http://localhost:3000/health
      - name: "✅ All tests passed!"
        run: echo "App is healthy and all tests passed!"