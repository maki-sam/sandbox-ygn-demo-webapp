name: "CD — Build & Push Docker Image"

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/sandbox-ygn-webapp


# ── jobs ─────────────────────────────────────────────────────
jobs:

  # ── job: build-and-push ────────────────────────────────────
  build-and-push:
    name: "Build Docker Image & Push to Docker Hub"
    runs-on: ubuntu-latest

    steps:
      - name: "⬇️ Checkout code"
        uses: actions/checkout@v4

      - name: "🔐 Log in to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "🔧 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🐳 Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .                  # Build context = current directory (where Dockerfile is)
          push: true                  # true = actually push after building (false = build only)
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha        # Read cache from GitHub Actions cache
          cache-to: type=gha,mode=max # Write all layers to cache for next run

      - name: "📋 Print image summary"
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "║       ✅ Docker image pushed successfully!    ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "  Image name : ${{ env.IMAGE_NAME }}"
          echo ""
          echo "  Tags pushed:"
          echo "    → :latest"
          echo "    → :${{ github.sha }}"
          echo ""
          echo "  Triggered by: ${{ github.actor }}"
          echo "  Commit:       ${{ github.sha }}"
          echo "  Branch:       ${{ github.ref_name }}"
          echo ""
          echo "  View on Docker Hub:"
          echo "  https://hub.docker.com/r/${{ env.IMAGE_NAME }}/tags"
          echo ""

      - name: "🔍 Verify image is pullable"
        run: |
          echo "Pulling image to verify it was pushed correctly..."
          docker pull ${{ env.IMAGE_NAME }}:latest
          echo "✅ Image verified — pull successful!"
