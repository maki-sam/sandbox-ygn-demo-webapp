name: "CI — Test on Every Push"
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: "Run App Tests"
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine        # Official Redis image (small)
        ports:
          - 6379:6379                # Maps container port 6379 to runner's 6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      - name: "⬇️ Checkout code"
        uses: actions/checkout@v4
      - name: "🟢 Set up Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: "📦 Install dependencies"
        run: npm install

      - name: "🧪 Start app and test all endpoints"
        env:
          REDIS_HOST: localhost       # Where to find Redis (mapped from service)
          REDIS_PORT: 6379            # Redis default port
          NODE_ENV: test              # Tells our app it's in test mode
          PORT: 3000                  # Port our app listens on
        run: |
          node app.js &
          APP_PID=$!
          echo "App started with PID: $APP_PID"
          echo "⏳ Waiting for app to be ready..."
          for i in $(seq 1 15); do
            if curl --silent --fail http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ App is ready after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "❌ App failed to start within 15 seconds"
              kill $APP_PID 2>/dev/null
              exit 1
            fi
            echo "  Attempt $i/15 — waiting..."
            sleep 1
          done

          echo ""
          echo "══════════════════════════════════════"
          echo "🧪 TEST 1: /health endpoint"
          echo "══════════════════════════════════════"
          HEALTH_RESPONSE=$(curl --silent http://localhost:3000/health)
          echo "Response: $HEALTH_RESPONSE"

          if echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"'; then
            echo "✅ TEST 1 PASSED — health endpoint is healthy"
          else
            echo "❌ TEST 1 FAILED — expected status:ok in response"
            kill $APP_PID 2>/dev/null
            exit 1
          fi

          echo ""
          echo "══════════════════════════════════════"
          echo "🧪 TEST 2: /info endpoint"
          echo "══════════════════════════════════════"
          INFO_RESPONSE=$(curl --silent http://localhost:3000/info)
          echo "Response: $INFO_RESPONSE"

          if echo "$INFO_RESPONSE" | grep -q '"app"'; then
            echo "✅ TEST 2 PASSED — info endpoint returns app metadata"
          else
            echo "❌ TEST 2 FAILED — expected app field in response"
            kill $APP_PID 2>/dev/null
            exit 1
          fi

          echo ""
          echo "══════════════════════════════════════"
          echo "🧪 TEST 3: /counter endpoint (Redis)"
          echo "══════════════════════════════════════"
          COUNTER_RESPONSE=$(curl --silent http://localhost:3000/counter)
          echo "Response: $COUNTER_RESPONSE"

          if echo "$COUNTER_RESPONSE" | grep -q '"total_visits"'; then
            echo "✅ TEST 3 PASSED — counter endpoint works, Redis connected"
          else
            echo "❌ TEST 3 FAILED — expected total_visits in response"
            kill $APP_PID 2>/dev/null
            exit 1
          fi

          # ── All tests passed ──────────────────────────────
          echo ""
          echo "══════════════════════════════════════"
          echo "🎉 ALL TESTS PASSED — safe to merge!"
          echo "══════════════════════════════════════"

          # Clean up: kill the app process
          kill $APP_PID 2>/dev/null
          echo "App process stopped."
